version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: pee_postgres
    environment:
      POSTGRES_DB: pee_dev
      POSTGRES_USER: pee_user
      POSTGRES_PASSWORD: pee_password
    ports:
      - "5432:5432"
    volumes:
      - pee_postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pee_user -d pee_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pee_postgres_data:
